<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion | Le Grain Doré</title>
    <script type="module" src="/components/sidebar.js"></script>
    <script type="module" src="/components/header.js"></script>

    <link rel="stylesheet" href="/style/global.css" />
    <link rel="stylesheet" href="/style/header.css" />
    <link rel="stylesheet" href="/style/footer.css" />
    <link rel="stylesheet" href="/style/flex.css" />
    <link rel="stylesheet" href="/style/button.css" />
    <link rel="stylesheet" href="/style/sidebar.css" />

    <link rel="stylesheet" href="/style/auth/signin.css" />
  </head>
  <body>
    <div id="cart-sidebar" class="cart-sidebar"></div>
    <header id="header"></header>
    <main class="signin">
      <section class="login-container">
        <h2 class="login-title">Connexion</h2>

        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="login-email">Adresse Email</label>
            <input
              type="email"
              id="login-email"
              placeholder="exemple@mail.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="login-password">Mot de passe</label>
            <input
              type="password"
              id="login-password"
              placeholder="Votre mot de passe"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary login-btn">
            Se connecter
          </button>

          <p id="login-msg" class="login-msg"></p>
        </form>
      </section>
    </main>

    <script src="../javascript/auth.js"></script>
    <script src="../javascript/panier.js"></script>
  </body>
</html>
